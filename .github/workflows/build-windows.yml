name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Run tests
        run: pytest -q

      - name: Build executable
        run: pyinstaller --clean --noconfirm Jarvis.spec

      - name: Prepare release package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist\Jarvis.exe release\Jarvis.exe
          Copy-Item README.md release\README.md
          if (Test-Path .env.example) {
            Copy-Item .env.example release\.env.example
          }
          Compress-Archive -Path release\* -DestinationPath Jarvis-Windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-Windows
          path: Jarvis-Windows.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Jarvis-Windows.zip
            dist/Jarvis.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
